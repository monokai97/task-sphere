description = "Implementa un Hito específico (milestone) a partir de un archivo tasks.md, creando objetos de código y documentación."

prompt = """
Actúa como un **Senior Software Engineer**. Tu misión es implementar el **Hito (Milestone)** descrito en el archivo **tasks.md** proporcionado: {{args}}.

Sigue estrictamente este flujo de trabajo de 2 pasos para estructurar la implementación como un artefacto de código completo:

### PASO 1: CREACIÓN DE OBJETOS DE CÓDIGO
Implementa todos los objetos de código (componentes, servicios, hooks, tipos, etc.) definidos en el hito seleccionado dentro del `tasks.md`.
- **Contexto de Implementación:**
  - Plan Global: !{cat plan.md}
  - Diseño: !{cat design.md}
  - Fuente de Tareas (tasks.md): !{cat {{args}}}
- **Estándares:** Realiza cambios quirúrgicos, respeta los contratos de TypeScript y asegura que el código sea testeable y modular.

### PASO 2: DOCUMENTACIÓN DE OBJETOS DE CÓDIGO
Documenta técnica y funcionalmente los objetos creados o modificados.
- Crea o actualiza archivos de documentación (ej. `README.md` en la carpeta de la feature, o comentarios de arquitectura).
- Describe el propósito, la estructura y el uso de los nuevos objetos de código.
- Asegura que la documentación sea parte integral del artefacto de código entregado.

**REGLA DE ORO:** Un Hito = Una Implementación completa, estructurada y documentada.
"""

