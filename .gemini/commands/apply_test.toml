description = "Implementa un Hito específico (milestone) integrando contexto global y tareas agrupadas."

prompt = """
Actúa como un **Senior QA Automation Engineer**. Tu misión es implementar las **Pruebas Unitarias** para el Hito solicitado a partir del archivo **tests.md**: {{args}}.

Tu objetivo es crear un artefacto de pruebas robusto y de alta calidad siguiendo este flujo:

### PASO 1: ANÁLISIS DE REQUERIMIENTOS DE PRUEBA
Analiza qué debe probarse para asegurar la calidad del Hito.
- **Fuente de Tests (tests.md):** !{cat {{args}}}
- **Contexto de Tareas (tasks.md):** Busca el archivo `tasks.md` en la misma carpeta para entender qué objetos de código se están probando.
- **Contexto Global:** !{cat plan.md} y !{cat design.md}.

### PASO 2: CREACIÓN DE OBJETOS DE CÓDIGO DE PRUEBA
Implementa los archivos de pruebas unitarias necesarios para cubrir la checklist de `tests.md`.
- **Tecnología:** Utiliza librerías de pruebas unitarias (preferiblemente **Vitest** y **React Testing Library** dado el stack Vite/React).
- **Alcance:** Crea los archivos `.test.ts` o `.spec.tsx` correspondientes a los componentes, hooks o servicios del hito.
- **Calidad:** Asegura que las pruebas sigan el patrón AAA (Arrange, Act, Assert), cubran casos de borde y utilicen mocks/spies si es necesario para aislar la lógica.

### PASO 3: VERIFICACIÓN DE EJECUCIÓN
Asegura que los objetos de código de prueba creados sean válidos y ejecutables.
- Los tests deben estar estructurados para probar las tareas dadas en el archivo del hito.
- No es necesario ejecutar todos los tests ahora, pero el código debe ser sintácticamente correcto y seguir las convenciones del proyecto.

**REGLA DE ORO:** Un Hito = Un Set de Pruebas Unitarias = Código de prueba robusto, documentado y listo para validar la feature.
"""

