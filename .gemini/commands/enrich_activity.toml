description = "Refina una Actividad específica dividiéndola en Hitos y creando sus carpetas de trabajo dentro de la ruta de la actividad."

prompt = """
Actúa como un **Lead Solutions Architect**. Tu misión es refinar la Actividad: "{{args}}" desglosándola en Hitos técnicos y preparando su estructura física.

### PASO 1: Análisis de Contexto
1. **Identificar la Ruta:** El argumento `{{args}}` es la ruta a la carpeta de la actividad (ej. "1.Cimientos/Actividad 2 Estilizado/").
2  - **Diseño Técnico (Contexto):**: lee el archivo design.md de la raiz del proyecto
3. **Localizar el Contexto de Fase:** Sube un nivel en la jerarquía de directorios para encontrar y leer el archivo `phase_[n]_enrich_phase.md`.
4. **Consultar el Plan Maestro:** Lee `plan.md` en la raíz para validar los objetivos globales de la actividad.
5. **Consultar el Plan de la fase :** Lee `phase_n_enrich.md` en la  carpeta de la fase osea fase n/

### PASO 2: Definición de Hitos (Milestones)
Basándote en el desglose previo de la fase y el plan:
1. **Definir Hitos:** Identifica de 2 a 4 **Hitos** técnicos, secuenciales y atómicos necesarios para completar esta actividad al 100%.
2. **Nombrar Hitos:** Usa un formato claro (ej. "Definición de Interfaz", "Implementación del Adaptador", "Integración con Zustand").

### PASO 3: Generación del Reporte de Actividad (actividad-[n]-[slug].md)
Crea un archivo llamado `actividad-[n]-[NombreDeLaActividad].md` dentro de la carpeta de la actividad (`{{args}}`). El contenido debe incluir:
- **Resumen de la Actividad:** Objetivo técnico y archivos involucrados (según `design.md`).
- **Desglose de Hitos:** Una sección por cada hito detallando qué se debe lograr y cómo se verificará.
- **Justificación Técnica:** Por qué este desglose es óptimo para la implementación posterior.
- **Checklist de Carpetas de Hitos:** Lista de las carpetas creadas.

### PASO 4: Creación de Estructura de Hitos
Por cada hito identificado, crea una carpeta en la ruta de la actividad siguiendo este formato:
`Hito [N] [Nombre del Hito]/`

**Instrucción técnica:** Utiliza comandos de shell para crear las carpetas dentro de la ruta especificada.
!{mkdir "{{args}}/Hito 1 [Nombre1]" "{{args}}/Hito 2 [Nombre2]" ...}

### PASO 5: Cierre
Confirma la creación del archivo de enriquecimiento de la actividad en la carpeta de la actividad junto a las carpetas de los hitos  un archivo con nombre activity_[n]_enrich.md y. con una desripcion de los hitos encontrados para que cada hito sea procesado individualmente con el comando `ff_us`.

**REGLA DE ORO:** Un Hito es la unidad mínima de implementación. No generes código; enfócate en la estructura y la claridad de los objetivos técnicos.
"""
