description = "Genera una especificación técnica (spec.md) a partir del archivo de argumentos del proyecto (*-args.md), definiendo historias de usuario y arquitectura."

prompt = """
Actúa como un **Senior Software Architect y Product Strategist**. Tu objetivo es transformar los requisitos del proyecto en una especificación técnica formal de alto nivel.

### INMERSIÓN EN EL CONTEXTO
Para generar esta especificación, utilizarás como única fuente de entrada el archivo de argumentos del proyecto localizado en la raíz:
- **Fuente de Requisitos:** !{cat *-args.md}

### INSTRUCCIÓN CRÍTICA DE INTERACCIÓN:
Si los requisitos en el archivo `*-args.md` son vagos o les falta contexto para definir casos de borde, **NO generes el documento todavía**. Inicia un proceso de descubrimiento con 3 a 5 preguntas de clarificación sobre:
- Persistencia y consistencia.
- Manejo de estados complejos (ej. concurrencia, errores de storage).
- Experiencia de usuario (gestos, feedback visual).

### ESTRUCTURA REFORZADA DEL DOCUMENTO (spec.md):
Debes generar un documento que integre orgánicamente los siguientes lineamientos de diseño en cada sección relevante:

1. **Visión y Objetivos:**
   - Define el problema raíz, la solución propuesta y las métricas de éxito técnicas.
   - **Lineamiento de Diseño:** Establece las **Decisiones de Arquitectura** (Patrón de Flujo de Datos y Capas).

2. **Historias de Usuario Robustas:**
   - Clasifícalas en:
     - **Gestión Esencial:** Ingreso, creación, edición (in-place), eliminación.
     - **Eficiencia Operativa:** Búsqueda en tiempo real, filtrado por estados, contadores. **Lineamiento de Diseño:** Integra el **Sistema de Ordenamiento (Lexicographical Fractional Indexing)**.
     - **Visual & UX:** Modo oscuro, responsividad móvil, estados vacíos (empty states). **Lineamiento de Diseño:** Define el **Sistema de Estilos y Temas e Interfaces**.
     - **Resiliencia & Avanzado:** Sincronización multi-pestaña, manejo de fallos de storage (Modo Memoria), Drag & Drop. **Lineamiento de Diseño:** Detalla la **Concurrencia y Consistencia (Global Lock)**.

3. **Flujos de Navegación Detallados:**
   - Diagrama de pasos lógicos (preferiblemente en texto o Mermaid).

4. **Criterios de Aceptación (Gherkin):**
   - Define escenarios para el "Happy Path", "Edge Cases" y "Error Handling".

5. **Modelos de Datos e Interfaces:**
   - Define las entidades (ej. Task) y el estado global (ej. TodoState) con TypeScript estricto.
   - **Lineamiento de Diseño:** Sigue rigurosamente el **Esquema de Datos y Contratos (TypeScript)**.

6. **Restricciones Técnicas y Guías de Implementación:**
   - Define el **Stack Tecnológico**.
   - **Lineamiento de Diseño:** Especifica la **Estructura de Directorios (Scalable Path)** y las **Guardias para la Implementación (Operational Guidance)**.
   - Qué NO debe hacer el sistema y límites de performance.

### REGLAS DE COMPORTAMIENTO:
- **Procesamiento y Razonamiento:** Antes de escribir el archivo `spec.md`, realiza un análisis interno detallado de cómo cada requisito se alinea con los lineamientos de diseño. El resultado debe sentirse "pensado" y arquitectónicamente sólido.
- **Única Fuente de Verdad:** El documento debe ser tan detallado que elimine la necesidad de suposiciones durante la codificación.
- **Modularidad:** Estructura el archivo para que sea fácil de "digerir" por otros agentes.

**Salida:** Genera o sobreescribe el archivo **spec.md** en el directorio raíz. El documento debe ser profesional, técnico y estar listo para guiar el desarrollo.
"""
