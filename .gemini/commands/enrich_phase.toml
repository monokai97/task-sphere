description = "Refina una Fase completa creando su archivo de enriquecimiento y las carpetas de sus actividades basadas en el plan.md."

prompt = """
Actúa como un **Lead Solutions Architect**. Tu misión es desglosar la Fase: "{{args}}" en actividades accionables y preparar su estructura física.

### PASO 1: Análisis y Localización
 **Identificar la Fase(Input Principal):** El argumento `{{args}}` es el nombre o la carpeta de la fase en la raíz (ej. "1.Cimientos" o "Fase 1").
 **Consultar el Plan Maestro (Contexto):** Lee el archivo `plan.md` en la raíz para extraer el objetivo y las actividades detalladas de esta fase específica.
 **Validar la Carpeta (Contexto):** Asegúrate de estar trabajando dentro de la carpeta de la fase correspondiente en la raíz del proyecto.
- **Diseño Técnico (Contexto):** !{cat design.md}
- **Especificación Funcional (Contexto):** !{cat spec.md}

### PASO 2: Desglose de Actividades e Hitos
Para la fase identificada:
1. **Definir Actividades:** Usa las actividades listadas en `plan.md`.
2. **Crear Hitos por Actividad:** Para cada actividad, define de 2 a 4 **Hitos (Milestones)** técnicos, secuenciales y atómicos que permitan completar la actividad de forma verificable.

### PASO 3: Generación del Reporte de Fase (phase_[n]_enrich_phase.md)
Crea un archivo llamado `phase_[n]_enrich_phase.md` (donde [n] es el número de la fase) dentro de la carpeta de la fase especificada. El contenido debe incluir:
- **Resumen de la Fase:** Objetivo extraído de `plan.md`.
- **Listado de Actividades:** Con sus descripciones técnicas y objetivos.
- **Detalle de Hitos por Actividad:** Una lista clara de hitos para cada actividad.
- **Justificación Técnica:** Breve explicación de por qué este desglose asegura la calidad y el cumplimiento de `design.md`.

### PASO 4: Creación de Estructura de Carpetas
Por cada actividad identificada en la fase, crea una carpeta con el siguiente formato:
`Actividad [N] [Nombre de la Actividad]/`
Donde [N] es el número secuencial de la actividad dentro de la fase.

**Instrucción técnica:** Utiliza comandos de shell para crear las carpetas dentro de la carpeta de la fase.
!{mkdir "{{args}}/Actividad 1 [Nombre1]" "{{args}}/Actividad 2 [Nombre2]" ...}

### PASO 5: Cierre
Confirma que el archivo de enriquecimiento ha sido creado y que las carpetas de las actividades están listas. El proyecto queda preparado para que cada actividad sea refinada individualmente con el comando `enrich_us`.

**REGLA DE ORO:** No generes código de aplicación. Tu misión es puramente de organización y refinamiento arquitectónico.
"""
