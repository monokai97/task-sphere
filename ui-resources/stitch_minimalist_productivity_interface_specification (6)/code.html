<script>
        function closeModal() {
            const modal = document.getElementById('new-list-modal');
            const overlay = document.getElementById('modal-overlay');
            modal.classList.remove('scale-100');
            modal.classList.add('scale-95', 'opacity-0');
            overlay.classList.add('opacity-0');
            setTimeout(() => {
                // In a real app, this would route back or close the component
                console.log('Modal closed');
            }, 300);
        }

        function validateForm() {
            const input = document.getElementById('list-name-input');
            const btn = document.getElementById('create-btn');
            if (input.value.trim().length > 0) {
                btn.disabled = false;
                btn.classList.remove('opacity-40', 'cursor-not-allowed');
                btn.classList.add('hover:bg-primary-container', 'shadow-lg');
            } else {
                btn.disabled = true;
                btn.classList.add('opacity-40', 'cursor-not-allowed');
                btn.classList.remove('hover:bg-primary-container', 'shadow-lg');
            }
        }

        // Icon Selection Logic
        document.querySelectorAll('.icon-option').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.icon-option').forEach(b => {
                    b.classList.remove('text-primary', 'bg-primary-container/10', 'border-primary');
                    b.classList.add('text-on-surface-variant');
                });
                btn.classList.add('text-primary', 'bg-primary-container/10', 'border-primary');
                btn.classList.remove('text-on-surface-variant');
            });
        });

        // Color Selection Logic
        document.querySelectorAll('.color-option').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-option').forEach(b => {
                    b.classList.remove('ring-offset-4', 'ring-2', 'ring-primary', 'scale-110');
                });
                btn.classList.add('ring-offset-4', 'ring-2', 'ring-primary', 'scale-110');
                
                // Update active button color theme if needed
                const createBtn = document.getElementById('create-btn');
                const selectedColor = btn.classList[btn.classList.length - 2]; // Extracting color
                // We keep primary as the main action per system guidelines
            });
        });

        // Close on Esc
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
